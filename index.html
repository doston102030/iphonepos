<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-light.png" />
    <link rel="apple-touch-icon" href="/icon-light.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="inPOS" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf9f8" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#16131f" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="inPOS — do'kon uchun savdo, ombor, qarz va hisobot tizimi" />
    <title>inPOS</title>
    <script>
      // The dark class is otherwise added by a React effect, i.e. after the first
      // paint: a dark-mode user got a white flash on every load — and on every
      // 401, which reloads the page.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var dark = saved
            ? saved === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) { /* private mode: fall back to the light theme */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
